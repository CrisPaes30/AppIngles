spring:
  application:
    name: english-memory-ai
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:file:.env[.properties]

  jpa:
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  jackson:
    time-zone: America/Sao_Paulo

server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  ai:
    provider: ${AI_PROVIDER:openai}
  dictionary:
    provider: ${DICTIONARY_PROVIDER:openai}
  speech:
    provider: ${SPEECH_PROVIDER:openai}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini
    tts-model: ${OPENAI_TTS_MODEL:tts-1}
    tts-voice: ${OPENAI_TTS_VOICE:alloy}
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-mude-em-producao-minimo-256bits-xpto}
    expiration-ms: 86400000
  google:
    client-id: ${GOOGLE_CLIENT_ID:configure-no-env}
