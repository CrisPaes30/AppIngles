spring:
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/XE}
    username: ${DB_USERNAME:system}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1 FROM DUAL

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    contexts: dev

logging:
  level:
    com.englishmemory: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG

app:
  ai:
    provider: openai
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174,https://*.ngrok-free.app,https://*.ngrok.io
